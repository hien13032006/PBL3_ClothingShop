<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <title>Quản lý sản phẩm - Clothing Admin</title>
    <link rel="stylesheet" href="QLĐH.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
    <div class="admin-container">
        <div class="logo">
            <a href="index_QTV.html" id="name">Clothing</a>
            <span> |</span> <a href="#" id="qldh">Quản lý sản phẩm</a>
        </div>

        <div class="search-bar-container">
            <div class="search-input-group">
                <input type="text" id="product-search" placeholder="Tìm tên sản phẩm...">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
            </div>
            <button class="btn-search-main" onclick="handleFilter()">Tìm</button>
            <button class="btn-primary" onclick="openAddModal()">
                <i class="fa-solid fa-plus"></i> Thêm sản phẩm mới
            </button>
        </div>

        <div id="product-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Thêm Sản Phẩm Mới</h2>
                    <span class="close-btn" onclick="closeModal()">&times;</span>
                </div>
                <form id="add-product-form">
                    <input type="hidden" id="form-mode" value="add">
                    <div class="form-group">
                        <label>Tên sản phẩm:</label>
                        <input type="text" id="new-name" placeholder="Nhập tên sản phẩm" required>
                    </div>

                    <div class="form-group">
                        <label>Mô tả chi tiết:</label>
                        <textarea id="new-description" rows="3" placeholder="Nhập chất liệu, kiểu dáng, hướng dẫn bảo quản..." style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; resize: vertical;"></textarea>
                    </div>

                    <div class="form-group row">
                        <div class="col">
                            <label>Danh mục:</label>
                            <select id="new-category">
                                <option value="ao">Áo</option>
                                <option value="quan">Quần</option>
                                <option value="vay">Váy/Đầm</option>
                            </select>
                        </div>
                        <div class="col">
                            <label>Đối tượng:</label>
                            <select id="new-gender">
                                <option value="nam">Nam</option>
                                <option value="nu">Nữ</option>
                                <option value="treem">Trẻ em</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label style="margin-bottom: 8px;">Phân loại Màu sắc:</label>
                        <div class="checkbox-group">
                            <label class="checkbox-inline"><input type="checkbox" name="new-colors" value="Đen"> Đen</label>
                            <label class="checkbox-inline"><input type="checkbox" name="new-colors" value="Trắng"> Trắng</label>
                            <label class="checkbox-inline"><input type="checkbox" name="new-colors" value="Xám"> Xám</label>
                            <label class="checkbox-inline"><input type="checkbox" name="new-colors" value="Xanh"> Xanh</label>
                            <label class="checkbox-inline"><input type="checkbox" name="new-colors" value="Kem"> Kem</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label style="margin-bottom: 8px;">Phân loại Kích cỡ (Size):</label>
                        <div class="checkbox-group">
                            <label class="checkbox-inline"><input type="checkbox" name="new-sizes" value="S"> S</label>
                            <label class="checkbox-inline"><input type="checkbox" name="new-sizes" value="M"> M</label>
                            <label class="checkbox-inline"><input type="checkbox" name="new-sizes" value="L"> L</label>
                            <label class="checkbox-inline"><input type="checkbox" name="new-sizes" value="XL"> XL</label>
                            <label class="checkbox-inline"><input type="checkbox" name="new-sizes" value="XXL"> XXL</label>
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col">
                            <label>Giá bán (₫):</label>
                            <input type="number" id="new-price" value="0" min="0" required>
                        </div>
                        <div class="col">
                            <label>Số lượng kho:</label>
                            <input type="number" id="new-stock" value="1" min="0" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Link hình ảnh (URL):</label>
                        <input type="text" id="new-img" placeholder="images/example.jpg">
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn-cancel" onclick="closeModal()">Hủy bỏ</button>
                        <button type="submit" class="btn-save">Lưu sản phẩm</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="order-tabs">
            <button class="tab-item active" onclick="filterByGender('all', this)">Tất cả</button>
            <button class="tab-item" onclick="filterByGender('nam', this)">Thời trang nam</button>
            <button class="tab-item" onclick="filterByGender('nu', this)">Thời trang nữ</button>
            <button class="tab-item" onclick="filterByGender('treem', this)">Thời trang trẻ em</button>
            <button class="tab-item" onclick="filterByGender('out-of-stock', this)">Hết hàng</button>
        </div>

        <div class="table-card">
            <table class="order-table">
                <thead>
                    <tr>
                        <th>HÌNH ẢNH</th>
                        <th>TÊN SẢN PHẨM</th>
                        <th>PHÂN LOẠI</th>
                        <th>GIÁ BÁN</th>
                        <th>KHO</th>
                        <th>THAO TÁC</th>
                    </tr>
                </thead>
                <tbody id="product-list">
                </tbody>
            </table>
        </div>
    </div>

    <!--Footer-->
    <footer class="main-footer">
        <div class="footer-container">
            <div class="footer-col">
                <h1 class="footer-logo">Clothing</h1>
                <p class="footer-slogan">Shop áo quần online</p>
            </div>

            <div class="footer-col">
                <ul class="footer-links">
                    <li><a href="#"><i class="fa-solid fa-angles-right"></i> Giới thiệu</a></li>
                    <li><a href="#"><i class="fa-solid fa-angles-right"></i> Liên hệ</a></li>
                    <li><a href="#"><i class="fa-solid fa-angles-right"></i> Tin tức</a></li>
                </ul>
            </div>

            <div class="footer-col">
                <ul class="footer-links">
                    <li><a href="#"><i class="fa-solid fa-angles-right"></i> Hướng dẫn</a></li>
                    <li><a href="#"><i class="fa-solid fa-angles-right"></i> Hỗ trợ khách hàng</a></li>
                </ul>
                <div class="footer-socials">
                    <a href="#"><i class="fa-brands fa-tiktok"></i></a>
                    <a href="#"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#"><i class="fa-brands fa-facebook"></i></a>
                </div>
            </div>
        </div>
    </footer>
    <script src="QLSP.js"></script>
</body>
</html>
