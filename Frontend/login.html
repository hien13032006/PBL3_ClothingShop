<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Clothing</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container">
            <h1 class="login-title">LOGIN</h1>

            <form id="login-form">
                <div class="input-group">
                    <input type="text" id="email_phone" placeholder="Nhập email/SĐT" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                </div>
                <button type="submit" class="btn-login-main">Log in</button>
                <div class="login-footer-links">
                    <a href="#" class="forgot-pass">Forgot password?</a>
                    <a href="dangky.html" class="sign-up">Sign up</a>
                </div>
            </form>

            <div class="or-separator"><span class="separator-text">or</span></div>

            <button class="btn-google-login">
                <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google Logo" class="google-icon">
                <span class="google-text">Log in with Google</span>
            </button>
        </div>
    </div>

    <div id="custom-alert" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <h3 id="modal-title">Thông báo</h3>
            <p id="modal-message"></p>
            <button class="btn-confirm" onclick="closeModal()">Đồng ý</button>
        </div>
    </div>

    <script src="web.js"></script>
    <script src="login.js"></script>
</body>
</html>
