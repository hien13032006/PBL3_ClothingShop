<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Clothing</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container">
            <h1 class="login-title" style="margin-bottom: 30px;">REGISTER</h1>

            <form id="register-form">
                <div class="input-group">
                    <input type="text" id="fullname" placeholder="Họ và tên" required>
                </div>

                <div class="input-group">
                    <input type="tel" id="reg-phone" placeholder="Số điện thoại" required>
                </div>

                <div class="input-group">
                    <input type="email" id="reg-email" placeholder="Email (Không bắt buộc)">
                </div>

                <div class="input-group">
                    <input type="password" id="reg-password" placeholder="Nhập mật khẩu" required>
                </div>

                <div class="input-group">
                    <input type="password" id="confirm-password" placeholder="Xác nhận mật khẩu" required>
                </div>

                <button type="submit" class="btn-login-main">Sign up</button>

                <div class="login-footer-links" style="justify-content: center; margin-top: 20px;">
                    <span style="color: #888; font-size: 14px;">Đã có tài khoản? </span>
                    <a href="login.html" style="margin-left: 5px; font-weight: 600;">Log in</a>
                </div>
            </form>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
