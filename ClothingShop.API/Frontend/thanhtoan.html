<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Thanh toán</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

    <style>
        .logo {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

            #name {
                text-decoration: none;
                font-size: 55px;
                font-weight: bold;
                color: #333;
                letter-spacing: 1px;
                line-height: 1;
            }

            .logo span {
                color: #333;
                font-weight: 300;
            }

            #tt {
                text-decoration: none;
                font-size: 40px;
                font-weight: bold;
                color: #333;
            }

            #name:hover {
                color: #ff6b81;
                text-shadow: 2px 2px 5px rgba(0,0,0,0.2); /* Thêm đổ bóng */
            }
    </style>


    <div class="logo">
        <a href="index.html" id="name"> Clothing</a>
        <span> |</span> <a href="#" id="tt">Thanh toán</a>
    </div>



    <!--Footer-->
    <footer class="main-footer">
        <div class="footer-container">
            <div class="footer-col">
                <h1 class="footer-logo">Clothing</h1>
                <p class="footer-slogan">Shop áo quần online</p>
            </div>

            <div class="footer-col">
                <ul class="footer-links">
                    <li><a href="#"><i class="fa-solid fa-angles-right"></i> Giới thiệu</a></li>
                    <li><a href="#"><i class="fa-solid fa-angles-right"></i> Liên hệ</a></li>
                    <li><a href="#"><i class="fa-solid fa-angles-right"></i> Tin tức</a></li>
                </ul>
            </div>

            <div class="footer-col">
                <ul class="footer-links">
                    <li><a href="#"><i class="fa-solid fa-angles-right"></i> Hướng dẫn</a></li>
                    <li><a href="#"><i class="fa-solid fa-angles-right"></i> Hỗ trợ khách hàng</a></li>
                </ul>
                <div class="footer-socials">
                    <a href="#"><i class="fa-brands fa-tiktok"></i></a>
                    <a href="#"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#"><i class="fa-brands fa-facebook"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <script src="web.js"></script>

</body>
